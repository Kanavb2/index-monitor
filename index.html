<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Index Monitor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="hdr-left">
        <h1>Global Index Monitor</h1>
        <p id="headerDate"></p>
      </div>
      <div class="hdr-right">
        <label class="auto-refresh">
          <span class="toggle">
            <input type="checkbox" id="arToggle">
            <span class="toggle-track"></span>
          </span>
          Auto-refresh 60 s
        </label>
        <span class="ts" id="ts">&mdash;</span>
        <button class="btn-refresh" id="btnRef">
          <svg class="ico-ref" width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          Refresh
        </button>
      </div>
    </header>

    <div class="summary" id="summary"></div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search by index, country, or region...">
      </div>
      <div class="sort-wrap">
        <label class="sort-label">Sort</label>
        <select id="sortSelect" class="sort-select">
          <option value="region">Region</option>
          <option value="change-desc">Best performing</option>
          <option value="change-asc">Worst performing</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
    </div>

    <div class="err-banner" id="errBanner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errMsg"></span>
    </div>

    <main id="main"></main>

    <footer>
      <p>Data sourced from Yahoo Finance. Prices may be delayed.</p>
      <p>Press <kbd>R</kbd> to refresh.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
