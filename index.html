<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Daily Index Monitor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <div class="app">
    <header class="map-header">
      <div class="hdr-left">
        <h1>Global Daily Index Monitor</h1>
        <p id="headerDate"></p>
      </div>
      <div class="hdr-right">
        <label class="auto-refresh">
          <span class="toggle">
            <input type="checkbox" id="arToggle">
            <span class="toggle-track"></span>
          </span>
          Auto-refresh 60 s
        </label>
        <span class="ts" id="ts">&mdash;</span>
        <button class="btn-refresh" id="btnRef">
          <svg class="ico-ref" width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          Refresh
        </button>
      </div>
    </header>

    <div id="map"></div>

    <div class="map-panel" id="summaryPanel"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config/indices.js"></script>
  <script src="config/api.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
